<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migration des tier lists</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    button { padding: 12px 20px; font-size: 1rem; cursor: pointer; border-radius: 10px;
             border: 2px solid #111; background: #ffd84a; font-weight: 600; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    pre { background: #111; color: #5dff9d; padding: 14px; border-radius: 10px;
          white-space: pre-wrap; margin-top: 16px; min-height: 60px; }
    .status { font-weight: 600; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>🔄 Migration des anciennes tier lists</h1>
  <p>Cette page copie les anciens classements (<code>rankings/</code>) vers le nouveau format (<code>boards/</code>).
     À lancer <strong>une seule fois</strong>, connecté en tant qu'admin, avec les <strong>règles temporaires</strong> publiées.</p>
  <p class="status" id="status">Vérification de la connexion…</p>
  <button id="migrateBtn" disabled>Migrer maintenant</button>
  <pre id="log"></pre>
  <script type="module" src="js/migrate.js"></script>
</body>
</html>
